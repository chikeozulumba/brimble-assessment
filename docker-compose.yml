services:
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    networks: [ bimbo_apps ]
    volumes:
      - registry_data:/var/lib/registry
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:5000/v2/" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  buildkit:
    image: moby/buildkit:latest
    privileged: true
    restart: unless-stopped
    command:
      [
        "--config",
        "/etc/buildkit/buildkitd.toml",
        "--addr",
        "tcp://0.0.0.0:1234",
      ]
    volumes:
      - ./buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
    networks: [ bimbo_apps ]
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/buildctl",
          "--addr",
          "tcp://127.0.0.1:1234",
          "debug",
          "workers",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks: [ bimbo_apps ]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://bimbo:bimbo@db:5432/bimbo
      CADDY_ADMIN_URL: http://caddy:2019
      APPS_NETWORK: bimbo_apps
      PUBLIC_BASE_URL: http://localhost:8080
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      BUILDKIT_HOST: tcp://buildkit:1234
      REGISTRY_PUSH_HOST: registry:5000
      REGISTRY_RUN_HOST: localhost:5000
      RAILPACK_FRONTEND: ghcr.io/railwayapp/railpack-frontend:v0.23.0
      RAILPACK_VERBOSE: ${RAILPACK_VERBOSE:-}
      LOGS_DIR: /tmp/bimbo/logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - bimbo_work:/tmp/bimbo
    depends_on:
      registry:
        condition: service_healthy
      buildkit:
        condition: service_healthy
      db:
        condition: service_healthy
      caddy:
        condition: service_started
    networks: [ bimbo_apps ]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    networks: [ bimbo_apps ]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bimbo
      POSTGRES_PASSWORD: bimbo
      POSTGRES_DB: bimbo
    volumes:
      - bimbo_db:/var/lib/postgresql/data
    networks: [ bimbo_apps ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bimbo" ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  bimbo_apps:
    name: bimbo_apps

volumes:
  caddy_data:
  caddy_config:
  bimbo_db:
  bimbo_work:
  registry_data:
